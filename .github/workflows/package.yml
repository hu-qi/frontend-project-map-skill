name: Package Skill

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Validate and package skill
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill
        run: python scripts/validate_skill.py .

      - name: Build dist zip
        run: python scripts/build_dist.py .

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-project-map-skill
          path: dist/frontend-project-map-skill.zip
          if-no-files-found: error

      - name: Write package summary
        run: |
          echo "## Skill package built" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact name: \`frontend-project-map-skill\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package inside artifact: \`frontend-project-map-skill.zip\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Open this workflow run and download it from the **Artifacts** section." >> "$GITHUB_STEP_SUMMARY"
          echo "- For a permanent release asset, push a tag such as \`v1.0.0\`." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/frontend-project-map-skill.zip
