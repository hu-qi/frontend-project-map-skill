name: Package Skill

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Validate and package skill
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill
        run: python scripts/validate_skill.py .

      - name: Build dist zip
        run: python scripts/build_dist.py .

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-project-map-skill
          path: dist/frontend-project-map-skill.zip
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/frontend-project-map-skill.zip
