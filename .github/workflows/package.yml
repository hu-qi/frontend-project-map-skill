name: Package Skill

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Validate and package skill
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill
        run: python scripts/validate_skill.py .

      - name: Build dist zip
        run: python scripts/build_dist.py .

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-project-map-skill
          path: dist/frontend-project-map-skill.zip
          if-no-files-found: error

      - name: Write package summary
        run: |
          echo "## Skill package built" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact name: \`frontend-project-map-skill\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package inside artifact: \`frontend-project-map-skill.zip\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Open this workflow run and download it from the **Artifacts** section." >> "$GITHUB_STEP_SUMMARY"
          echo "- Main branch pushes also update the **latest** GitHub Release." >> "$GITHUB_STEP_SUMMARY"
          echo "- Version tags like \`v1.0.0\` create immutable versioned releases." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish latest release from main
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push -f origin refs/tags/latest
          gh release delete latest --yes --cleanup-tag || true
          git tag -f latest "$GITHUB_SHA"
          git push -f origin refs/tags/latest
          gh release create latest dist/frontend-project-map-skill.zip \
            --title "Latest skill package" \
            --notes "Automated latest build from main commit $GITHUB_SHA." \
            --latest

      - name: Publish versioned release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/frontend-project-map-skill.zip
